<!DOCTYPE html>
<html>
<head>

<title>Sameer Restaurant</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#d32f2f;
color:white;
padding:15px;
text-align:center;
}

.search{
width:90%;
margin:10px auto;
display:block;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.section{
padding:20px;
}

.menu-row{
display:flex;
overflow-x:auto;
gap:15px;
}

.food{
min-width:160px;
background:white;
border-radius:10px;
padding:10px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.food img{
width:100%;
height:110px;
object-fit:cover;
border-radius:8px;
}

button{
background:#d32f2f;
color:white;
border:none;
padding:5px 10px;
border-radius:5px;
}

.qty{
margin:0 10px;
font-weight:bold;
}

.cart{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
padding:15px;
box-shadow:0 -3px 10px rgba(0,0,0,0.3);
}

.pay{
background:green;
margin-left:10px;
}

</style>

<script>

var cart={}
var total=0

function plus(id,name,price){

if(!cart[id]){
cart[id]={name:name,price:price,qty:0}
}

cart[id].qty++

document.getElementById("q"+id).innerText=cart[id].qty

update()

}

function minus(id){

if(cart[id]){

cart[id].qty--

if(cart[id].qty<=0){

cart[id].qty=0
delete cart[id]

}

document.getElementById("q"+id).innerText=cart[id]?cart[id].qty:0

}

update()

}

function update(){

total=0
var items=""

for(var i in cart){

items+=cart[i].name+" x"+cart[i].qty+"<br>"

total+=cart[i].price*cart[i].qty

}

document.getElementById("items").innerHTML=items
document.getElementById("total").innerText="₹"+total

}

/* FIXED PAYMENT FUNCTION */

function upi(){

if(total<=0){

alert("Please add item first")

return

}

var amount = total

var upiLink = "upi://pay?pa=7992428242@fam&pn=SameerRestaurant&am="+amount+"&cu=INR"

window.open(upiLink)

}

function whatsapp(){

var msg="Order:%0A"

for(var i in cart){

msg+=cart[i].name+" x"+cart[i].qty+"%0A"

}

msg+="Total ₹"+total

window.open("https://wa.me/917992428242?text="+msg)

}

function searchFood(){

var input=document.getElementById("search").value.toLowerCase()

var foods=document.getElementsByClassName("food")

for(var i=0;i<foods.length;i++){

var txt=foods[i].innerText.toLowerCase()

if(txt.includes(input)){

foods[i].style.display="block"

}else{

foods[i].style.display="none"

}

}

}

</script>

</head>

<body>

<header>

<h2>Sameer Restaurant</h2>

<p>Near Nagarmall, Khalifa Bagh, Bhagalpur</p>

<p>⏰ 10 AM – 11 PM | 🚚 Free Delivery (7km)</p>

</header>

<input id="search" class="search" onkeyup="searchFood()" placeholder="Search food...">

<div class="section">

<h3>Indian Food</h3>

<div class="menu-row">

<div class="food">

<img src="https://upload.wikimedia.org/wikipedia/commons/4/45/A_small_bowl_of_Biryani.jpg">

Biryani ₹180

<br>

<button onclick="minus(1)">-</button>

<span id="q1" class="qty">0</span>

<button onclick="plus(1,'Biryani',180)">+</button>

</div>

<div class="food">

<img src="https://upload.wikimedia.org/wikipedia/commons/3/35/Paneer_Butter_Masala.jpg">

Paneer Butter Masala ₹160

<br>

<button onclick="minus(2)">-</button>

<span id="q2" class="qty">0</span>

<button onclick="plus(2,'Paneer Butter Masala',160)">+</button>

</div>

<div class="food">

<img src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Dal_Tadka.jpg">

Dal Tadka ₹120

<br>

<button onclick="minus(3)">-</button>

<span id="q3" class="qty">0</span>

<button onclick="plus(3,'Dal Tadka',120)">+</button>

</div>

<div class="food">

<img src="https://upload.wikimedia.org/wikipedia/commons/3/33/Butter_Chicken.jpg">

Butter Chicken ₹240

<br>

<button onclick="minus(4)">-</button>

<span id="q4" class="qty">0</span>

<button onclick="plus(4,'Butter Chicken',240)">+</button>

</div>

</div>

</div>

<div class="cart">

<div id="items"></div>

<h3>Total <span id="total">₹0</span></h3>

<button onclick="whatsapp()">Order WhatsApp</button>

<button class="pay" onclick="upi()">Pay UPI</button>

</div>

</body>

</html>
