<!DOCTYPE html>
<html>
<head>
<title>Sameer Restaurant</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#ff5722;
color:white;
text-align:center;
padding:20px;
font-size:28px;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.food{
background:white;
border-radius:10px;
padding:10px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.food img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

.qty{
font-size:18px;
margin:5px;
}

button{
background:#ff5722;
color:white;
border:none;
padding:5px 10px;
border-radius:5px;
cursor:pointer;
}

.cart{
background:white;
margin:20px;
padding:15px;
border-radius:10px;
}

</style>

<script>

var cart={}
var total=0

function plus(item,price){

if(!cart[item]){
cart[item]={price:price,qty:0}
}

cart[item].qty+=1

update()

}

function minus(item){

if(cart[item]){

cart[item].qty-=1

if(cart[item].qty<=0){
delete cart[item]
}

}

update()

}

function update(){

var list=""
total=0

for(var i in cart){

list+=i+" x"+cart[i].qty+"<br>"
total+=cart[i].price*cart[i].qty

}

document.getElementById("cart").innerHTML=list
document.getElementById("total").innerHTML="Total ₹"+total

}

function order(){

var phone="+917992428242"

var message="Restaurant Order:%0A"

for(var i in cart){

message+=i+" x"+cart[i].qty+"%0A"

}

message+="Total ₹"+total

window.open("https://wa.me/"+phone+"?text="+message)

}

</script>

</head>

<body>

<header>
🍽 Sameer Restaurant
</header>

<div class="menu">

<div class="food">
<img src="https://upload.wikimedia.org/wikipedia/commons/4/45/A_small_bowl_of_Biryani.jpg">
<h3>Chicken Biryani</h3>
<p>₹180</p>

<button onclick="minus('Chicken Biryani')">−</button>
<span class="qty">Qty</span>
<button onclick="plus('Chicken Biryani',180)">+</button>

</div>

<div class="food">
<img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Supreme_pizza.jpg">
<h3>Pizza</h3>
<p>₹250</p>

<button onclick="minus('Pizza')">−</button>
<span class="qty">Qty</span>
<button onclick="plus('Pizza',250)">+</button>

</div>

<div class="food">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/RedDot_Burger.jpg">
<h3>Burger</h3>
<p>₹120</p>

<button onclick="minus('Burger')">−</button>
<span class="qty">Qty</span>
<button onclick="plus('Burger',120)">+</button>

</div>

</div>

<div class="cart">

<h2>🛒 Cart</h2>

<div id="cart"></div>

<h3 id="total">Total ₹0</h3>

<button onclick="order()">Order on WhatsApp</button>

</div>

</body>
</html>
