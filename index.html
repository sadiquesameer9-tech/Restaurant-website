<!DOCTYPE html>
<html>
<head>

<title>Sameer Restaurant</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#ff5722;
color:white;
text-align:center;
padding:20px;
font-size:28px;
}

.section{
padding:20px;
}

.section h2{
margin-bottom:10px;
}

.menu-row{
display:flex;
overflow-x:auto;
gap:15px;
}

.food{
min-width:180px;
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
text-align:center;
}

.food img{
width:100%;
height:120px;
object-fit:cover;
border-radius:8px;
}

.controls{
margin-top:8px;
}

button{
background:#ff5722;
color:white;
border:none;
padding:5px 10px;
border-radius:5px;
font-size:16px;
}

.qty{
font-size:18px;
margin:0 10px;
font-weight:bold;
}

.cart{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
}

</style>

<script>

var cart={}
var total=0

function plus(id,name,price){

if(!cart[id]){
cart[id]={name:name,price:price,qty:0}
}

cart[id].qty++

document.getElementById("q"+id).innerText=cart[id].qty

update()

}

function minus(id){

if(cart[id]){

cart[id].qty--

if(cart[id].qty<=0){

cart[id].qty=0
delete cart[id]

}

document.getElementById("q"+id).innerText=cart[id]?cart[id].qty:0

}

update()

}

function update(){

var list=""
total=0

for(var i in cart){

list+=cart[i].name+" x"+cart[i].qty+"<br>"

total+=cart[i].price*cart[i].qty

}

document.getElementById("cart").innerHTML=list
document.getElementById("total").innerText="Total ₹"+total

}

function order(){

var phone="917992428242"

var msg="Restaurant Order:%0A"

for(var i in cart){

msg+=cart[i].name+" x"+cart[i].qty+"%0A"

}

msg+="Total ₹"+total

window.open("https://wa.me/"+phone+"?text="+msg)

}

</script>

</head>

<body>

🍽 Sameer Restaurant
