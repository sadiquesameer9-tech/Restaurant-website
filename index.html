<!DOCTYPE html>
<html>
<head>
<title>Sameer Restaurant</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#ff5722;
color:white;
text-align:center;
padding:20px;
font-size:28px;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.food{
background:white;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
padding:10px;
text-align:center;
}

.food img{
width:100%;
border-radius:10px;
}

.price{
color:green;
font-weight:bold;
}

button{
background:#ff5722;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#e64a19;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50px;
text-decoration:none;
}

</style>

<script>

function order(item){
var phone="+917992428242"
var message="Hello, I want to order "+item
var url="https://wa.me/"+phone+"?text="+encodeURIComponent(message)
window.open(url)
}

</script>

</head>

<body>

<header>
🍽 Sameer Restaurant
</header>

<div class="menu">

<div class="food">
<img src="https://source.unsplash.com/400x300/?biryani">
<h3>Chicken Biryani</h3>
<p class="price">₹180</p>
<button onclick="order('Chicken Biryani')">Order</button>
</div>

<div class="food">
<img src="https://source.unsplash.com/400x300/?pizza">
<h3>Pizza</h3>
<p class="price">₹250</p>
<button onclick="order('Pizza')">Order</button>
</div>

<div class="food">
<img src="https://source.unsplash.com/400x300/?burger">
<h3>Burger</h3>
<p class="price">₹120</p>
<button onclick="order('Burger')">Order</button>
</div>

<div class="food">
<img src="https://source.unsplash.com/400x300/?paneer">
<h3>Paneer Butter Masala</h3>
<p class="price">₹160</p>
<button onclick="order('Paneer Butter Masala')">Order</button>
</div>

</div>

<a class="whatsapp" href="#">WhatsApp</a>

</body>
</html>
