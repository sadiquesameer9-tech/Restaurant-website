<!DOCTYPE html>
<html>
<head>
<title>Sameer Restaurant</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#ff5722;
color:white;
text-align:center;
padding:20px;
font-size:28px;
}

h2{
padding-left:20px;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.food{
background:white;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
padding:10px;
text-align:center;
}

.food img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

button{
background:#ff5722;
color:white;
border:none;
padding:8px 12px;
border-radius:5px;
cursor:pointer;
}

.cart{
background:white;
margin:20px;
padding:15px;
border-radius:10px;
}

</style>

<script>

var cart={}
var total=0

function add(item,price){

if(cart[item]){
cart[item].qty+=1
}else{
cart[item]={price:price,qty:1}
}

update()

}

function update(){

var list=""
total=0

for(var i in cart){

list+=i+" x"+cart[i].qty+"<br>"
total+=cart[i].price*cart[i].qty

}

document.getElementById("cart").innerHTML=list
document.getElementById("total").innerHTML="Total ₹"+total

}

function order(){

var phone="91XXXXXXXXXX"

var message="Restaurant Order:%0A"

for(var i in cart){

message+=i+" x"+cart[i].qty+"%0A"

}

message+="Total ₹"+total

window.open("https://wa.me/"+phone+"?text="+message)

}

</script>

</head>

<body>

<header>
🍽 Sameer Restaurant
</header>

<h2>🍛 Indian Food</h2>

<div class="menu">

<div class="food">
<img src="https://upload.wikimedia.org/wikipedia/commons/4/45/A_small_bowl_of_Biryani.jpg">
<h3>Chicken Biryani</h3>
<p>₹180</p>
<button onclick="add('Chicken Biryani',180)">Add +1</button>
</div>

<div class="food">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/35/Paneer_Butter_Masala.jpg">
<h3>Paneer Butter Masala</h3>
<p>₹160</p>
<button onclick="add('Paneer Butter Masala',160)">Add +1</button>
</div>

</div>

<h2>🍗 Starter</h2>

<div class="menu">

<div class="food">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/09/Chicken_Tikka.jpg">
<h3>Chicken Tikka</h3>
<p>₹220</p>
<button onclick="add('Chicken Tikka',220)">Add +1</button>
</div>

<div class="food">
<img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Samosachutney.jpg">
<h3>Samosa</h3>
<p>₹30</p>
<button onclick="add('Samosa',30)">Add +1</button>
</div>

</div>

<h2>🍕 Fast Food</h2>

<div class="menu">

<div class="food">
<img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Supreme_pizza.jpg">
<h3>Pizza</h3>
<p>₹250</p>
<button onclick="add('Pizza',250)">Add +1</button>
</div>

<div class="food">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/RedDot_Burger.jpg">
<h3>Burger</h3>
<p>₹120</p>
<button onclick="add('Burger',120)">Add +1</button>
</div>

</div>

<h2>🥤 Cold Drinks</h2>

<div class="menu">

<div class="food">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/7a/Coca-Cola_glass_bottle.jpg">
<h3>Coca Cola</h3>
<p>₹40</p>
<button onclick="add('Coca Cola',40)">Add +1</button>
</div>

<div class="food">
<img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Pepsi_can.jpg">
<h3>Pepsi</h3>
<p>₹40</p>
<button onclick="add('Pepsi',40)">Add +1</button>
</div>

</div>

<h2>🍰 Dessert</h2>

<div class="menu">

<div class="food">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Gulab_jamun.jpg">
<h3>Gulab Jamun</h3>
<p>₹60</p>
<button onclick="add('Gulab Jamun',60)">Add +1</button>
</div>

<div class="food">
<img src="https://upload.wikimedia.org/wikipedia/commons/b/bb/Ice_Cream_dessert_02.jpg">
<h3>Ice Cream</h3>
<p>₹80</p>
<button onclick="add('Ice Cream',80)">Add +1</button>
</div>

</div>

<div class="cart">

<h2>🛒 Cart</h2>

<div id="cart"></div>

<h3 id="total">Total ₹0</h3>

<button onclick="order()">Order on WhatsApp</button>

</div>

</body>
</html>
