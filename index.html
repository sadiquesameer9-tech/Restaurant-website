<!DOCTYPE html>
<html>
<head>

<title>Sameer Restaurant</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#d32f2f;
color:white;
text-align:center;
padding:15px;
}

.logo{
width:220px;
}

.search{
padding:10px;
width:90%;
margin:10px auto;
display:block;
border-radius:8px;
border:1px solid #ccc;
}

.section{
padding:20px;
}

.menu-row{
display:flex;
overflow-x:auto;
gap:15px;
}

.food{
min-width:170px;
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
text-align:center;
}

.food img{
width:100%;
height:120px;
object-fit:cover;
border-radius:8px;
}

.controls{
margin-top:8px;
}

button{
background:#d32f2f;
color:white;
border:none;
padding:6px 10px;
border-radius:5px;
font-size:16px;
}

.qty{
font-size:18px;
margin:0 10px;
font-weight:bold;
}

.cart{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
}

.order{
background:green;
margin-top:10px;
}

</style>

<script>

var cart={}
var total=0

function plus(id,name,price){

if(!cart[id]){
cart[id]={name:name,price:price,qty:0}
}

cart[id].qty++

document.getElementById("q"+id).innerText=cart[id].qty

update()

}

function minus(id){

if(cart[id]){

cart[id].qty--

if(cart[id].qty<=0){

cart[id].qty=0
delete cart[id]

}

document.getElementById("q"+id).innerText=cart[id]?cart[id].qty:0

}

update()

}

function update(){

var list=""
total=0

for(var i in cart){

list+=cart[i].name+" x"+cart[i].qty+"<br>"

total+=cart[i].price*cart[i].qty

}

document.getElementById("cart").innerHTML=list
document.getElementById("total").innerText="Total ₹"+total

}

function order(){

var phone="917992428242"

var msg="Restaurant Order:%0A"

for(var i in cart){

msg+=cart[i].name+" x"+cart[i].qty+"%0A"

}

msg+="Total ₹"+total

window.open("https://wa.me/"+phone+"?text="+msg)

}

</script>

</head>

<body>

<header>

<img class="logo" src="https://i.imgur.com/V6R9T5H.png">

<h2>Sameer Restaurant</h2>

<p>Near Nagarmall, Khalifa Bagh, Bhagalpur</p>

</header>

<input class="search" placeholder="Search food...">

<div class="section">

<h2>Indian Food</h2>

<div class="menu-row">

<div class="food">

<img src="https://upload.wikimedia.org/wikipedia/commons/4/45/A_small_bowl_of_Biryani.jpg">

Biryani ₹180

<div class="controls">

<button onclick="minus(1)">-</button>

<span id="q1" class="qty">0</span>

<button onclick="plus(1,'Biryani',180)">+</button>

</div>

</div>

<div class="food">

<img src="https://upload.wikimedia.org/wikipedia/commons/3/35/Paneer_Butter_Masala.jpg">

Paneer Butter Masala ₹160

<div class="controls">

<button onclick="minus(2)">-</button>

<span id="q2" class="qty">0</span>

<button onclick="plus(2,'Paneer Butter Masala',160)">+</button>

</div>

</div>

<div class="food">

<img src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Dal_Tadka.jpg">

Dal Tadka ₹120

<div class="controls">

<button onclick="minus(3)">-</button>

<span id="q3" class="qty">0</span>

<button onclick="plus(3,'Dal Tadka',120)">+</button>

</div>

</div>

</div>

</div>

<div class="cart">

<h2>Cart</h2>

<div id="cart"></div>

<h3 id="total">Total ₹0</h3>

<button class="order" onclick="order()">Order on WhatsApp</button>

</div>

</body>

</html>
